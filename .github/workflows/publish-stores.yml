name: Publish browser stores

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish, for example v0.1.1
        required: true
        type: string
      publish_chrome:
        description: Upload and submit an update to the Chrome Web Store
        required: true
        default: false
        type: boolean
      publish_firefox:
        description: Request an unlisted AMO signature and attach the XPI to the GitHub Release
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  chrome:
    if: ${{ inputs.publish_chrome }}
    runs-on: ubuntu-latest
    environment: extension-signing
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/check-release-version.mjs "${{ inputs.tag }}"
      - run: make package
      - name: Upload and submit Chrome Web Store package
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_PUBLISHER_ID: ${{ vars.CWS_PUBLISHER_ID }}
          CWS_ITEM_ID: ${{ vars.CWS_ITEM_ID }}
        run: node scripts/publish-chrome-store.mjs dist/cf-access-header-injector.zip

  firefox:
    if: ${{ inputs.publish_firefox }}
    runs-on: ubuntu-latest
    environment: extension-signing
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/check-release-version.mjs "${{ inputs.tag }}"
      - run: make check
      - run: make firefox-lint
      - run: make package
      - name: Request Mozilla signature
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          test -n "$WEB_EXT_API_KEY" && test -n "$WEB_EXT_API_SECRET" || {
            echo "::error title=Missing AMO credentials::Set AMO_JWT_ISSUER and AMO_JWT_SECRET in extension-signing."
            exit 1
          }
          NO_UPDATE_NOTIFIER=1 npm_config_cache=.npm-cache npx --yes web-ext@9.4.0 sign --channel=unlisted --source-dir dist/firefox-package --artifacts-dir dist/firefox
          xpi_path="$(find dist/firefox -maxdepth 1 -type f -name '*.xpi' -print -quit)"
          test -n "$xpi_path"
          mv "$xpi_path" dist/cf-access-header-injector-firefox.xpi
      - name: Generate signed XPI provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: dist/cf-access-header-injector-firefox.xpi
      - name: Add signed XPI to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag }}" dist/cf-access-header-injector-firefox.xpi --clobber
