    <rect width="128" height="128" rx="27" fill="#12344d"/><path d="M64 18 105 33v29c0 25-16 39-41 50C39 101 23 87 23 62V33l41-15Z" fill="#f4f8fb"/><path d="M42 50h35l-8-8 7-7 20 20-20 20-7-7 8-8H42v-10Zm44 18h-35l8 8-7 7-20-20 20-20 7 7-8 8h35v10Z" fill="#1666cc"/>
