  <text x="154" y="175" fill="#172b3a" font-family="Arial, sans-serif" font-size="38" font-weight="700">CF Access Header Injector</text>
  <text x="154" y="220" fill="#476277" font-family="Arial, sans-serif" font-size="21">Configure one Cloudflare Access service token per HTTPS site.</text>
  <text x="154" y="253" fill="#476277" font-family="Arial, sans-serif" font-size="21">Only the two fixed service-token headers are added to approved requests.</text>
  <rect x="150" y="294" width="704" height="320" rx="12" fill="#f9fbfd" stroke="#b8c8d6" stroke-width="2"/>
  <text x="182" y="335" fill="#172b3a" font-family="Arial, sans-serif" font-size="22" font-weight="700">Cloudflare Access site</text>
  <text x="182" y="377" fill="#243b4d" font-family="Arial, sans-serif" font-size="18" font-weight="700">Domain scope</text>
  <rect x="182" y="390" width="640" height="43" rx="6" fill="#fff" stroke="#aabccc"/><text x="198" y="419" fill="#233b50" font-family="Menlo, monospace" font-size="17">*.vookie.net</text>
  <text x="182" y="473" fill="#243b4d" font-family="Arial, sans-serif" font-size="18" font-weight="700">CF Access Client ID</text>
  <rect x="182" y="486" width="640" height="43" rx="6" fill="#fff" stroke="#aabccc"/><text x="198" y="515" fill="#233b50" font-family="Menlo, monospace" font-size="17">example.access.cfargotunnel.com</text>
  <text x="182" y="569" fill="#243b4d" font-family="Arial, sans-serif" font-size="18" font-weight="700">CF Access Client Secret</text>
  <rect x="182" y="582" width="640" height="43" rx="6" fill="#fff" stroke="#aabccc"/><text x="198" y="611" fill="#233b50" font-family="Menlo, monospace" font-size="17">••••••••••••••••••••••••••••</text>
  <rect x="885" y="294" width="250" height="320" rx="12" fill="#fff9eb" stroke="#e0a000" stroke-width="2"/>
  <text x="916" y="338" fill="#6f5300" font-family="Arial, sans-serif" font-size="21" font-weight="700">Security note</text>
  <text x="916" y="378" fill="#5d4b14" font-family="Arial, sans-serif" font-size="17">Credentials stay</text>
  <text x="916" y="405" fill="#5d4b14" font-family="Arial, sans-serif" font-size="17">in local browser</text>
  <text x="916" y="432" fill="#5d4b14" font-family="Arial, sans-serif" font-size="17">storage. Use a</text>
  <text x="916" y="459" fill="#5d4b14" font-family="Arial, sans-serif" font-size="17">dedicated token</text>
  <text x="916" y="486" fill="#5d4b14" font-family="Arial, sans-serif" font-size="17">for each narrow</text>
  <text x="916" y="513" fill="#5d4b14" font-family="Arial, sans-serif" font-size="17">site scope.</text>
  <rect x="150" y="654" width="212" height="52" rx="8" fill="#1666cc"/><text x="185" y="687" fill="#fff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Save configuration</text>
  <text x="387" y="687" fill="#476277" font-family="Arial, sans-serif" font-size="17">Example values only. No secret is shown.</text>
